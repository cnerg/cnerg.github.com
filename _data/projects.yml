- short_code: shine-newton
  area_code: nsa
  title: REDUCE
  agency: arpa-e
  start_date: 2025-10-01
  end_date: 2029-09-30
  lead_pi: rr
  cnerg_pi: pphw
  cnerg_collaborators: 
  other_collaborators: [ bl, ac ]
  abstract: "SHINE Technologies will develop an innovative method to reduce used
nuclear fuel (UNF) and the disposal impact through its Recover Elements -
Destroy Undesirables - Create Energy (REDUCE) procedure. The proposed approach
will reduce the volume, longevity, and hazard level of reactor waste, and will
improve the economics of its reprocessing/transmutation. After recovery of
uranium and plutonium (for advanced reactor fuel) and other valuable elements,
the remaining UNF constituents will be incorporated into a molten salt
transmutation target designed to be coupled to an external neutron source. This
program will design, simulate, and test game-changing technologies that will
reduce the environmental impact of nuclear energy through the recycling and
transmutation of used nuclear fuel.  "
  pubs:
  project_url: https://arpa-e.energy.gov/programs-and-initiatives/search-all-projects/reduce-recover-elements-destroy-undesirables-create-energy
